<!DOCTYPE html>
<html>
<head>
    <title>Book a Vehicle</title>
</head>
<body>

    <h1>DRIVEEASY CAR RENTALS</h1>

    <hr>

    <!-- the navigation menu that appears on all pages of the website --> 
    <nav>
        <a href="index.html">Home</a> |
        <a href="cars.html">Cars</a> |
        <a href="booking.html">Booking</a> |
        <a href="contact.html">Contact Us</a>
    </nav>

    <hr>

    <!-- heading for the booking page -->
    <h2>BOOK A VEHICLE</h2>

    <form>

        <label>Name:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel"><br><br>

        <label>Select Vehicle:</label><br>

        <!-- this is the dropdown menu that allows the user to select a vehicle to book -->
        <select>
            <option>Toyota Corolla</option>
            <option>Mazda CX-5</option>
            <option>Nissan Note</option>
            <option>Mercedes C200</option>
            <option>BMW M5</option>
            <option>Isuzu D-Max</option>
        </select>

        <br><br>

        <!-- these are the date input fields that allow the user to select the pick-up and return dates for the booking -->
        <label>Pick-up Date:</label><br>
        <input type="date"><br><br>

        <label>Return Date:</label><br>
        <input type="date"><br><br>

        <!-- this is the textarea for additional notes about the booking --> 
        <label>Additional Notes:</label><br>

        <textarea rows="5" cols="40"></textarea>

        <br><br>

        <input type="submit" value="SUBMIT BOOKING">

    </form>

</body>
</html>
